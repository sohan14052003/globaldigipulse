<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educate And Learn</title>
    <link rel="stylesheet" href="loginpage.css">
    <style>
        body {
            background-color: #ffe066;
        }
        .login-page-bg {
            background-image: url('/ui/html/detail-brain-animation-hd-8k-wallpaper-background-stock-photographic-image_915071-23473.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            min-height: 100vh;
            position: relative;
        }
        .login-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-right: 5vw;
            position: relative;
            z-index: 1;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffe066 0%, #2e9ad0 100%);
            opacity: 0.85;
            z-index: 0;
        }
        .login-box {
            padding: 40px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(46, 154, 208, 0.18);
            min-width: 340px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #fff;
            font-size: 2.6rem;
            text-shadow: 2px 2px 12px #2e9ad0, 0 2px 8px #ffe066;
            font-weight: bold;
            letter-spacing: 2px;
        }
        h2 {
            text-align: center;
            margin-bottom: 28px;
            font-size: 2rem;
            color: #2e9ad0;
            font-weight: 700;
            text-shadow: 1px 1px 8px #ffe066;
        }
        .input-box {
            display: flex;
            align-items: center;
            border: 1px solid #2e9ad0;
            border-radius: 8px;
            padding: 12px;
            background: #fff;
            box-shadow: 0 2px 8px #ffe066;
            width: 100%;
        }
        .input-box img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        button, #registerBtn {
            padding: 14px 0;
            font-size: 18px;
            background: #2e9ad0;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            z-index: 11;
            font-weight: 600;
            box-shadow: 0 2px 8px #ffe066;
            transition: background 0.3s;
            width: 100%;
        }
        p {
            margin-top: 22px;
            text-align: center;
            font-size: 16px;
            color: #2e9ad0;
        }
        a {
            color: #ff4e50;
            font-weight: 600;
            text-decoration: underline;
        }
        #message {
            margin-top: 18px;
            color: #ff4e50;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }
        footer {
            text-align: center;
            padding: 16px 0;
            color: #fff;
            font-size: 16px;
            text-shadow: 1px 1px 4px #2e9ad0;
            position: relative;
            z-index: 2;
        }
        .login-box input:focus {
            box-shadow: 0 0 8px #2e9ad0;
        }
        .login-box button:hover {
            background: #ff4e50 !important;
            color: #fff !important;
        }
        @media (max-width: 600px) {
            .login-box {
                min-width: 98vw !important;
                padding: 16px !important;
            }
            .login-container {
                padding-right: 0 !important;
            }
            h1 {
                font-size: 1.4rem !important;
            }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="login-page-bg">
    <div class="gradient-overlay"></div>
    <div class="login-container">
        <div style="position:absolute;top:40px;left:0;width:100%;text-align:center;z-index:2;">
            <h1>WELCOME TO EDUCATE AND LEARN YOURSELF</h1>
        </div>
        <div class="login-box" style="margin-top:110px;">
            <h2>Login</h2>
            <form id="loginForm" style="display:flex;flex-direction:column;gap:10px;width:100%;" autocomplete="off">
                <div class="input-box">
                    <img src="/ui/html/usericon.jpg" alt="User Icon">
                    <input type="text" id="username" placeholder="Username or Email" required style="padding:12px;font-size:18px;border:none;outline:none;background:transparent;width:100%;" autocomplete="off">
                </div>
                <div class="input-box">
                    <img src="/ui/images/lock.jpg" alt="Lock Icon">
                    <input type="password" id="password" placeholder="Password" required style="padding:12px;font-size:18px;border:none;outline:none;background:transparent;width:100%;" autocomplete="off">
                    <img src="/ui/html/eye.jpg" alt="Show Password" id="togglePassword" style="width:22px;height:22px;cursor:pointer;">
                </div>
                <button type="submit">Sign in</button>
            </form>
            <div style="margin-top:18px;width:100%;display:flex;justify-content:center;gap:12px;">
                <button id="registerBtn" style="background:#2e9ad0;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px #ffe066;width:auto;min-width:120px;">New user? Register here</button>
                <button id="forgotBtn" style="background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px #2e9ad0;width:auto;min-width:120px;">Forgot user?</button>
            </div>  
            <div id="message"></div>
        </div>
        <!-- Forgot User Popup -->
        <div id="forgotPopup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.65);z-index:1000;align-items:center;justify-content:center;">
            <div style="background:#fff;padding:32px 24px;border-radius:18px;box-shadow:0 8px 32px rgba(46,154,208,0.18);max-width:90vw;display:flex;flex-direction:column;align-items:center;">
                <h2 style="color:#2e9ad0;margin-bottom:18px;">Forgot User</h2>
                <input type="email" id="forgotEmail" placeholder="Enter your email" style="padding:12px;font-size:18px;border-radius:8px;border:1px solid #2e9ad0;margin-bottom:18px;width:100%;max-width:320px;">
                <button id="sendForgotBtn" style="background:#2e9ad0;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px #ffe066;margin-bottom:12px;">Send</button>
                <button onclick="closeForgotPopup()" style="background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:16px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px #2e9ad0;">Close</button>
                <div id="forgotMsg" style="margin-top:12px;color:#ff4e50;font-weight:600;text-align:center;"></div>
            </div>
        </div>
        <!-- Loading spinner -->
        <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center;">
            <div style="border:8px solid #2e9ad0;border-top:8px solid #ffe066;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
        </div>
    </div>
    <footer>ALL RIGHTS RESERVED</footer>
    <script>
    document.getElementById("loginForm").addEventListener("submit", async function(e) {
        e.preventDefault();
        // Prevent form auto-refresh and accidental input clearing
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;
        const spinner = document.getElementById("loadingSpinner");
        spinner.style.display = "flex";
        let messageDiv = document.getElementById("message");
        try {
            const response = await fetch("https://your-backend.onrender.com/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await response.json();
            if (data.success) {
                // If user entered an email, send thank you message
                if (username.includes("@")) {
                    fetch("https://your-backend.onrender.com/send-login-thankyou", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email: username })
                    });
                }
                // Keep spinner visible during redirect
                setTimeout(() => {
                    window.location.href = "ScanAndPay.html";
                }, 600); // slight delay for UX
            } else {
                spinner.style.display = "none";
                messageDiv.textContent = "Login failed: " + (data.error || "Invalid credentials");
                // Do NOT clear input fields on error
            }
        } catch {
            spinner.style.display = "none";
            messageDiv.textContent = "Server error or invalid response.";
            // Do NOT clear input fields on error
        }
        // No form reset or input clearing
    });

    document.getElementById("togglePassword").addEventListener("click", function() {
        const passwordInput = document.getElementById("password");
        if (passwordInput.type === "password") {
            passwordInput.type = "text";
        } else {
            passwordInput.type = "password";
        }
    });

    document.getElementById("registerBtn").addEventListener("click", function() {
        window.location.href = "RegisterPage.html";
    });

    document.getElementById("forgotBtn").addEventListener("click", function() {
        document.getElementById("forgotPopup").style.display = "flex";
    });
    function closeForgotPopup() {
        document.getElementById("forgotPopup").style.display = "none";
        document.getElementById("forgotMsg").textContent = "";
        // Do NOT clear forgotEmail input unless popup is closed
        document.getElementById("forgotEmail").value = "";
    }
    document.getElementById("sendForgotBtn").addEventListener("click", async function() {
        const email = document.getElementById("forgotEmail").value;
        const forgotMsg = document.getElementById("forgotMsg");
        if (!email) {
            forgotMsg.textContent = "Please enter your email.";
            return;
        }
        forgotMsg.textContent = "Sending...";
        try {
            const response = await fetch("https://globaldigipulse.onrender.com/forgot-user", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            if (data.success && data.resetLink) {
                forgotMsg.innerHTML = `Reset link: <a href='https://globaldigipulse.onrender.com${data.resetLink}' target='_blank'>Click here to reset your username and password</a>`;
            } else {
                forgotMsg.textContent = data.error || "Unable to send details.";
            }
        } catch {
            forgotMsg.textContent = "Server error or invalid response.";
        }
    });
    </script>
</body>
</html>
