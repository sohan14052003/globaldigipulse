<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="loginpage.css">
    <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            background-image: url('../images/brainimages.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            min-height: 100vh;
            position: relative;
        }
        .login-page-bg {
            background-image: url('/html/detail-brain-animation-hd-8k-wallpaper-background-stock-photographic-image_915071-23473.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            min-height: 100vh;
            position: relative;
        }
        .login-container {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            height: 100vh;
            padding-right: 5vw;
            position: relative;
            z-index: 1;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #ffe066 0%, #2e9ad0 100%);
            opacity: 0.85;
            z-index: 0;
            pointer-events: none;
        }
        .login-box {
            padding: 56px 40px 40px 40px;
            border-radius: 28px;
            box-shadow: 0 8px 32px #2e9ad0, 0 0 32px #ffe066;
            min-width: 340px;
            max-width: 420px;
            z-index: 10;
            background: rgba(255, 255, 255, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: box-shadow 0.3s, transform 0.3s;
        }
        .login-box:hover {
            box-shadow: 0 12px 48px #ff4e50, 0 0 48px #ffe066;
            transform: translateY(-4px) scale(1.025);
        }
        .login-box::before {
            content: '';
            position: absolute;
            top: -40px;
            right: -40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle,#ffe066 60%,#ff4e50 100%);
            opacity: 0.13;
            border-radius: 50%;
            z-index: 0;
        }
        .login-box::after {
            content: '';
            position: absolute;
            bottom: -40px;
            left: -40px;
            width: 120px;
            height: 120px;
            background: radial-gradient(circle,#2e9ad0 60%,#b37faa 100%);
            opacity: 0.13;
            border-radius: 50%;
            z-index: 0;
        }
        .login-box h2 {
            z-index: 1;
        }
        .login-box .input-box {
            z-index: 1;
        }
        /* Creative New User & Forgot User Buttons */
        .login-box .action-btns {
            margin-top: 8px;
            width: 100%;
            display: flex;
            flex-direction: row;
            gap: 16px;
            align-items: stretch;
            z-index: 1;
        }
        #registerBtn, #forgotBtn {
            flex: 1;
            height: auto;
            padding: 16px 0;
            font-size: 18px;
            font-weight: 700;
            border-radius: 14px;
            border: none;
            box-shadow: 0 2px 12px #ffe066, 0 2px 8px #ff4e50;
            background: linear-gradient(90deg,#2e9ad0 0%,#ffe066 100%);
            color: #fff;
            letter-spacing: 1px;
            transition: background 0.3s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }
        #registerBtn:hover, #forgotBtn:hover {
            background: linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
        }
        #forgotBtn {
            background: linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);
        }
        #forgotBtn:hover {
            background: linear-gradient(90deg,#2e9ad0 0%,#ffe066 100%);
        }
        p {
            margin-top: 22px;
            text-align: center;
            font-size: 16px;
            color: #2e9ad0;
        }
        a {
            color: #ff4e50;
            font-weight: 600;
            text-decoration: underline;
        }
        #message {
            margin-top: 18px;
            color: #fff !important;
            background: #ff4e50;
            border-radius: 8px;
            padding: 8px 0 8px 0;
            text-align: center;
            font-size: 18px;
            font-weight: 700;
            box-shadow: 0 2px 8px #ff4e50, 0 2px 8px #ffe066;
            min-height: 32px;
            letter-spacing: 1px;
            transition: background 0.2s, color 0.2s;
        }
        footer {
            text-align: center;
            padding: 16px 0;
            color: #fff;
            font-size: 16px;
            text-shadow: 1px 1px 4px #2e9ad0;
            position: relative;
            z-index: 2;
        }
        .login-box input:focus {
            box-shadow: 0 0 8px #2e9ad0;
        }
        @media (max-width: 600px) {
            .login-box {
                min-width: 98vw !important;
                padding: 16px !important;
            }
            .login-container {
                padding-right: 0 !important;
            }
            h1 {
                font-size: 1.4rem !important;
            }
            .login-container h1 {
                font-size: 1.7rem !important;
            }
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Registration Modal Styles */
        #registerModal, #forgotPopup, #loadingSpinner {
            pointer-events: none;
        }
        #registerModal[style*="display: flex"],
        #forgotPopup[style*="display: flex"],
        #loadingSpinner[style*="display: flex"] {
            pointer-events: auto;
        }
        #registerModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.7);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }
        #registerModal > div {
            background: #fff;
            padding: 32px 24px;
            border-radius: 18px;
            box-shadow: 0 8px 32px #2e9ad0;
            max-width: 420px;
            width: 95vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #registerModal h1 {
            color: #2e9ad0;
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 18px;
            text-shadow: 1px 1px 8px #ffe066;
        }
        #registerModal button.close {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #2e9ad0;
            font-size: 22px;
            cursor: pointer;
        }
        #registerModal form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        #registerModal input {
            padding: 8px;
            font-size: 15px;
            border: 1px solid #2e9ad0;
            border-radius: 12px;
        }
        #registerModal button[type="submit"] {
            padding: 12px 0;
            font-size: 18px;
            background: #2e9ad0;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 2px 8px #ffe066;
            transition: background 0.3s;
        }
        #registerMessageModal {
            margin-top: 16px;
            color: #ff4e50;
            font-size: 17px;
            font-weight: 600;
            text-align: center;
        }
        .login-box button[type="submit"] {
            padding: 8px 0;
            font-size: 17px;
            background: linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            box-shadow: 0 2px 12px #ffe066, 0 2px 8px #ff4e50;
            letter-spacing: 1px;
            margin-top: 14px;
            margin-bottom: 6px;
            transition: background 0.3s, transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            min-height: 36px;
            max-height: 38px;
        }
        .login-box button[type="submit"]:hover {
            background: linear-gradient(90deg,#2e9ad0 0%,#ffe066 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
            box-shadow: 0 4px 18px #2e9ad0, 0 2px 12px #ffe066;
        }
        .login-container h1 {
            font-size: 2.8rem !important;
            font-weight: bold;
            color: #000 !important;
            text-shadow: 2px 2px 12px #ffe066, 0 2px 8px #2e9ad0;
            margin-bottom: 18px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body class="login-page-bg">
    <div class="gradient-overlay"></div>
    <div class="login-container">
        <div style="position:absolute;top:40px;left:0;width:100%;text-align:center;z-index:2;">
            <h1>WELCOME TO GLOBAL DIGI PULSE</h1>
        </div>
        <div class="login-box" style="margin-top:110px;">
            <h2>Login</h2>
            <form id="loginForm" style="display:flex;flex-direction:column;gap:10px;width:100%;" autocomplete="off">
                <div class="input-box" style="width:90%;margin:0 auto;">
                    <img src="/html/usericon.jpg" alt="User Icon">
                    <input type="text" id="username" placeholder="Username or Email" required style="padding:12px;font-size:18px;border:none;outline:none;background:transparent;width:180px;max-width:100%;" autocomplete="off">
                </div>
                <div class="input-box" style="width:90%;margin:0 auto;position:relative;">
                    <img src="../images/lock.jpg" alt="Lock Icon" style="width:22px;height:22px;vertical-align:middle;">
                    <input type="password" id="password" placeholder="Password" required style="padding:12px;font-size:18px;border:none;outline:none;background:transparent;width:180px;max-width:100%;padding-right:36px;" autocomplete="off">
                    <img src="/html/eye.jpg" alt="Show Password" id="togglePassword" style="width:22px;height:22px;cursor:pointer;position:absolute;right:10px;top:50%;transform:translateY(-50%);">
                </div>
                <button type="submit">Sign in</button>
            </form>
            <div class="action-btns">
                <button id="registerBtn" type="button">New user? Register here</button>
                <button id="forgotBtn" type="button">Forgot user?</button>
            </div>  
            <div id="message"></div>
            <noscript>
                <div style="margin-top:10px;">
                    <a href="/RegisterPage.html" style="color:#2e9ad0;font-weight:bold;">Register here (if button does not work)</a>
                </div>
            </noscript>
        </div>
        <!-- Loading spinner -->
        <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center;">
            <div style="border:8px solid #2e9ad0;border-top:8px solid #ffe066;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
        </div>
        <!-- Forgot user popup -->
        <div id="forgotPopup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.8);z-index:1000;justify-content:center;align-items:center;">
            <div style="background:#fff;padding:24px;border-radius:12px;box-shadow:0 4px 16px rgba(0,0,0,0.2);position:relative;width:90%;max-width:400px;">
                <h2 style="color:#2e9ad0;margin-bottom:16px;">Forgot Username/Password?</h2>
                <div class="input-box" style="margin-bottom:12px;padding-right:4px;height:38px;min-height:unset;">
                    <img src="/html/usericon.jpg" alt="User Icon" style="width:18px;height:18px;margin-right:6px;">
                    <input type="email" id="forgotEmail" placeholder="Enter your registered email" required style="padding:8px 6px;font-size:15px;border:none;outline:none;background:transparent;width:100%;box-sizing:border-box;height:100%;min-height:unset;">
                </div>
                <button id="sendForgotBtn" style="background:#2e9ad0;color:#fff;border:none;border-radius:8px;padding:10px;font-size:16px;font-weight:600;cursor:pointer;width:100%;transition:background 0.3s;">Click to Get Reset Link</button>
                <div id="forgotMsg" style="margin-top:12px;color:#2e9ad0;font-size:16px;"></div>
                <button onclick="closeForgotPopup()" style="position:absolute;top:2px;right:12px;background:none;border:none;color:#2e9ad0;font-size:22px;cursor:pointer;width:32px;height:32px;line-height:32px;text-align:center;">&times;</button>
            </div>
        </div>
        <!-- Registration Modal Popup -->
        <div id="registerModal" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.7);z-index:2000;justify-content:center;align-items:center;">
            <div style="background:#fff;padding:32px 24px;border-radius:18px;box-shadow:0 8px 32px #2e9ad0;max-width:420px;width:95vw;position:relative;display:flex;flex-direction:column;align-items:center;">
                <button onclick="closeRegisterModal()" style="position:absolute;top:12px;right:12px;background:none;border:none;color:#2e9ad0;font-size:22px;cursor:pointer;">&times;</button>
                <h1 style="color:#2e9ad0;font-size:2.2rem;font-weight:bold;margin-bottom:18px;text-shadow:1px 1px 8px #ffe066;">Register New Account</h1>
                <form id="registerFormModal" style="width:100%;display:flex;flex-direction:column;gap:16px;" autocomplete="off">
                    <input type="text" id="registerUsername" name="username" placeholder="Username" required style="padding:8px;font-size:15px;border:1px solid #2e9ad0;border-radius:12px;">
                    <input type="email" id="registerEmail" name="email" placeholder="Email" required style="padding:8px;font-size:15px;border:1px solid #2e9ad0;border-radius:12px;">
                    <input type="password" id="registerPassword" name="password" placeholder="Password" required style="padding:8px;font-size:15px;border:1px solid #2e9ad0;border-radius:12px;">
                    <button type="submit" style="padding:12px 0;font-size:18px;background:#2e9ad0;color:#fff;border:none;border-radius:12px;font-weight:700;box-shadow:0 2px 8px #ffe066;transition:background 0.3s;">Register</button>
                </form>
                <div id="registerMessageModal" style="margin-top:16px;color:#ff4e50;font-size:17px;font-weight:600;text-align:center;"></div>
            </div>
        </div>
    </div>
    <footer>ALL RIGHTS RESERVED</footer>
    <script>
    console.log("Script loaded");
    document.addEventListener("DOMContentLoaded", function() {
        document.getElementById("loginForm").addEventListener("submit", async function(e) {
            e.preventDefault();
            // Prevent form auto-refresh and accidental input clearing
            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;
            const spinner = document.getElementById("loadingSpinner");
            spinner.style.display = "flex";
            let messageDiv = document.getElementById("message");
            try {
                const response = await fetch("https://globaldigipulse.onrender.com/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                const data = await response.json();
                if (data.success) {
                    // If user entered an email, send thank you message
                    if (username.includes("@")) {
                        fetch("https://globaldigipulse.onrender.com/send-login-thankyou", {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ email: username })
                        });
                    }
                    // Keep spinner visible during redirect
                    setTimeout(() => {
                        window.location.href = "ScanAndPay.html";
                    }, 600); // slight delay for UX
                } else {
                    spinner.style.display = "none";
                    messageDiv.textContent = "Invalid login";
                    // Do NOT clear input fields on error
                }
            } catch {
                spinner.style.display = "none";
                messageDiv.textContent = "Server error or invalid response.";
                // Do NOT clear input fields on error
            }
            // No form reset or input clearing
        });

        document.getElementById("togglePassword").addEventListener("click", function() {
            const passwordInput = document.getElementById("password");
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
            } else {
                passwordInput.type = "password";
            }
        });

        document.getElementById("registerBtn").addEventListener("click", function(e) {
            e.preventDefault();
            window.location.href = "RegisterPage.html";
        });

        document.getElementById("forgotBtn").addEventListener("click", function() {
            var popup = document.getElementById("forgotPopup");
            popup.style.display = "flex";
            popup.style.pointerEvents = "auto";
            // Also enable pointer events for all children
            Array.from(popup.querySelectorAll('*')).forEach(function(child) {
                child.style.pointerEvents = 'auto';
            });
            updateOverlayPointerEvents();
        });
        function closeForgotPopup() {
            document.getElementById("forgotPopup").style.display = "none";
            document.getElementById("forgotMsg").textContent = "";
            document.getElementById("forgotEmail").value = "";
            updateOverlayPointerEvents();
        }
        window.closeForgotPopup = closeForgotPopup;
        document.getElementById("sendForgotBtn").addEventListener("click", async function() {
            const email = document.getElementById("forgotEmail").value;
            const forgotMsg = document.getElementById("forgotMsg");
            if (!email) {
                forgotMsg.textContent = "Please enter your email.";
                return;
            }
            forgotMsg.textContent = "Sending...";
            try {
                const response = await fetch("https://globaldigipulse.onrender.com/forgot-user", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email })
                });
                const data = await response.json();
                if (data.success && data.resetLink) {
                    forgotMsg.innerHTML = `Reset link: <a href='${data.resetLink}' target='_blank'>Click here to reset your username and password</a>`;
                } else {
                    forgotMsg.textContent = data.error || "Unable to send details.";
                }
            } catch {
                forgotMsg.textContent = "Server error or invalid response.";
            }
        });

        // Helper: Ensure overlays never block clicks when hidden
        function updateOverlayPointerEvents() {
            ["registerModal", "forgotPopup", "loadingSpinner"].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) {
                    if (el.style.display === "none" || el.style.display === "") {
                        el.style.pointerEvents = "none";
                    } else {
                        el.style.pointerEvents = "auto";
                    }
                }
            });
        }
        // Patch all overlay show/hide logic
        ["registerModal", "forgotPopup", "loadingSpinner"].forEach(function(id) {
            var el = document.getElementById(id);
            if (el) {
                var observer = new MutationObserver(updateOverlayPointerEvents);
                observer.observe(el, { attributes: true, attributeFilter: ["style"] });
            }
        });
        updateOverlayPointerEvents();

        // Registration Modal Script
        function openRegisterModal() {
            var modal = document.getElementById('registerModal');
            modal.style.display = 'flex';
            modal.style.pointerEvents = 'auto'; // Ensure pointer events enabled
            // Also enable pointer events for all children
            Array.from(modal.querySelectorAll('*')).forEach(function(child) {
                child.style.pointerEvents = 'auto';
            });
            updateOverlayPointerEvents();
        }
        window.closeRegisterModal = function() {
            document.getElementById('registerModal').style.display = 'none';
            document.getElementById('registerMessageModal').textContent = '';
            document.getElementById('registerFormModal').reset();
            updateOverlayPointerEvents();
        }
        document.getElementById("registerFormModal").addEventListener("submit", async function(e) {
            e.preventDefault();
            const username = document.getElementById("registerUsername").value;
            const email = document.getElementById("registerEmail").value;
            const password = document.getElementById("registerPassword").value;
            const msgDiv = document.getElementById("registerMessageModal");
            msgDiv.textContent = "Registering...";
            try {
                const res = await fetch("https://globaldigipulse.onrender.com/register", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    msgDiv.style.color = "#2e9ad0";
                    msgDiv.textContent = "Registration successful! Redirecting to login...";
                    fetch("https://globaldigipulse.onrender.com/send-register-thankyou", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ email, username, password })
                    }).catch(() => {});
                    setTimeout(() => {
                        closeRegisterModal();
                        window.location.href = "LoginPage.html";
                    }, 1500);
                } else {
                    msgDiv.style.color = "#ff4e50";
                    msgDiv.textContent = data.message || "Registration failed.";
                }
            } catch (err) {
                msgDiv.style.color = "#ff4e50";
                msgDiv.textContent = "Server error. Please try again.";
            }
        });
    });
    </script>
</body>
</html>
