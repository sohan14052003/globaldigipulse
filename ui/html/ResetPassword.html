<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="loginpage.css">
    <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body { 
            background-color: #ffe066;
            background-image: url('/html/detail-brain-animation-hd-8k-wallpaper-background-stock-photographic-image_915071-23473.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
            min-height: 100vh;
            position: relative;
        }
        .reset-gradient {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #ffe066 0%, #2e9ad0 100%);
            opacity: 0.82;
            z-index: 0;
            pointer-events: none;
        }
        .reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
            z-index: 1;
        }
        .reset-box {
            padding: 48px 36px 40px 36px;
            border-radius: 32px;
            box-shadow: 0 8px 32px #2e9ad0, 0 0 32px #ffe066;
            min-width: 340px;
            background: rgba(255, 255, 255, 0.98);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            overflow: hidden;
            animation: fadeIn 1s, popIn 0.7s;
        }
        .reset-box::before {
            content: '';
            position: absolute;
            top: -40px; right: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle,#ffe066 60%,#ff4e50 100%);
            opacity: 0.13;
            border-radius: 50%;
            z-index: 0;
        }
        .reset-box::after {
            content: '';
            position: absolute;
            bottom: -40px; left: -40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle,#2e9ad0 60%,#b37faa 100%);
            opacity: 0.13;
            border-radius: 50%;
            z-index: 0;
        }
        .floating-shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.13;
            z-index: 0;
            animation: floatShape 5s infinite alternate ease-in-out;
        }
        .floating-shape1 {
            width: 38px; height: 38px;
            background: linear-gradient(135deg,#2e9ad0 60%,#ffe066 100%);
            top: 18px; left: 18px;
            animation-delay: 0.2s;
        }
        .floating-shape2 {
            width: 28px; height: 28px;
            background: linear-gradient(135deg,#ff4e50 60%,#ffe066 100%);
            bottom: 18px; right: 18px;
            animation-delay: 0.7s;
        }
        @keyframes floatShape {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-12px) scale(1.08); }
        }
        h2 { 
            color: #2e9ad0; 
            margin-bottom: 28px; 
            font-size: 2rem;
            font-weight: bold;
            text-shadow: 1px 1px 8px #ffe066, 0 2px 8px #2e9ad033;
            z-index: 1;
            letter-spacing: 1px;
        }
        .input-box { 
            width: 100%; 
            margin-bottom: 18px; 
            background: rgba(255,255,255,0.85);
            border-radius: 14px;
            box-shadow: 0 2px 8px #ffe066;
            padding: 4px 10px;
            display: flex;
            align-items: center;
            z-index: 1;
        }
        .input-box input {
            width: 100%;
            padding: 14px 12px;
            font-size: 18px;
            border-radius: 12px;
            border: 1.5px solid #2e9ad0;
            background: #fff;
            box-shadow: none;
            transition: box-shadow 0.3s, border 0.2s;
        }
        .input-box input:focus {
            box-shadow: 0 0 12px #2e9ad0;
            border: 2px solid #ff4e50;
        }
        button {
            padding: 16px 0;
            font-size: 20px;
            background: linear-gradient(90deg,#2e9ad0 0%,#ffe066 100%);
            color: #fff;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            font-weight: 700;
            box-shadow: 0 2px 12px #ffe066, 0 2px 8px #2e9ad0;
            width: 100%;
            margin-top: 2px;
            transition: background 0.3s, transform 0.2s;
        }
        button:hover {
            background: linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
        }
        #resetMsg {
            margin-top: 18px;
            color: #ff4e50;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            z-index: 1;
        }
        /* Forgot User Popup Styles */
        #forgotPopup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.4s;
        }
        #forgotPopup .popup-content {
            background: linear-gradient(135deg, #ffe066 0%, #2e9ad0 100%);
            padding: 32px 24px 28px 24px;
            border-radius: 20px;
            box-shadow: 0 8px 32px #2e9ad0, 0 0 32px #ffe066;
            max-width: 400px;
            width: 92vw;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: popupBounce 0.5s;
        }
        #forgotPopup h2 {
            color: #fff;
            font-size: 1.6rem;
            font-weight: bold;
            margin-bottom: 16px;
            text-shadow: 1px 1px 8px #2e9ad0;
        }
        #forgotPopup .input-box {
            margin-bottom: 14px;
            width: 100%;
            display: flex;
            align-items: center;
            background: rgba(255,255,255,0.85);
            border-radius: 10px;
            box-shadow: 0 2px 8px #ffe066;
            padding: 6px 10px;
        }
        #forgotPopup .input-box img {
            width: 20px;
            height: 20px;
            margin-right: 8px;
        }
        #forgotPopup input {
            border: none;
            outline: none;
            background: transparent;
            font-size: 16px;
            width: 100%;
            padding: 8px 0;
        }
        #sendForgotBtn {
            background: linear-gradient(90deg,#2e9ad0 0%,#ffe066 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 0;
            font-size: 17px;
            font-weight: 700;
            box-shadow: 0 2px 12px #ffe066, 0 2px 8px #2e9ad0;
            width: 100%;
            margin-top: 4px;
            transition: background 0.3s, transform 0.2s;
        }
        #sendForgotBtn:hover {
            background: linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);
            color: #fff;
            transform: translateY(-2px) scale(1.04);
        }
        #forgotMsg {
            margin-top: 12px;
            color: #fff;
            font-size: 16px;
            text-align: center;
            min-height: 22px;
            font-weight: 600;
            text-shadow: 1px 1px 6px #2e9ad0;
        }
        #forgotPopup .close-btn {
            position: absolute;
            top: 10px;
            right: 14px;
            background: none;
            border: none;
            color: #fff;
            font-size: 26px;
            cursor: pointer;
            width: 36px;
            height: 36px;
            line-height: 36px;
            text-align: center;
            border-radius: 50%;
            transition: background 0.2s;
        }
        #forgotPopup .close-btn:hover {
            background: rgba(46,154,208,0.15);
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes popupBounce {
            0% { transform: scale(0.8); }
            60% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <div class="reset-gradient"></div>
    <div class="reset-container">
        <div class="reset-box">
            <div class="floating-shape floating-shape1"></div>
            <div class="floating-shape floating-shape2"></div>
            <h2>Reset Username & Password</h2>
            <div class="input-box">
                <input type="text" id="newUsername" placeholder="Enter new username">
            </div>
            <div class="input-box">
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            <button id="resetBtn">Reset</button>
            <div id="resetMsg"></div>
        </div>
    </div>
    <div id="forgotPopup">
        <div class="popup-content">
            <button class="close-btn" onclick="closeForgotPopup()">&times;</button>
            <h2>Forgot Username or Password?</h2>
            <div class="input-box">
                <img src="/html/usericon.jpg" alt="User Icon">
                <input type="email" id="forgotEmail" placeholder="Enter your registered email" required>
            </div>
            <button id="sendForgotBtn">Get Reset Link</button>
            <div id="forgotMsg"></div>
        </div>
    </div>
    <script>
    // Get token from URL
    function getToken() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token');
    }
    document.getElementById('resetBtn').addEventListener('click', async function() {
        const newUsername = document.getElementById('newUsername').value;
        const newPassword = document.getElementById('newPassword').value;
        const resetMsg = document.getElementById('resetMsg');
        const token = getToken();
        if (!newUsername || !newPassword) {
            resetMsg.textContent = 'Please enter a new username and password.';
            return;
        }
        resetMsg.textContent = 'Resetting...';
        try {
            const response = await fetch('https://globaldigipulse.onrender.com/reset-username-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newUsername, newPassword })
            });
            const data = await response.json();
            if (data.success) {
                resetMsg.textContent = 'Reset successful! Use your new username and password to log in.';
                setTimeout(() => {
                    window.location.href = 'LoginPage.html';
                }, 1800);
            } else {
                resetMsg.textContent = data.error || 'Unable to reset.';
            }
        } catch {
            resetMsg.textContent = 'Server error or invalid response.';
        }
    });
    // --- Forgot User Popup Logic ---
    function closeForgotPopup() {
        document.getElementById("forgotPopup").style.display = "none";
        document.getElementById("forgotMsg").textContent = "";
        document.getElementById("forgotEmail").value = "";
    }
    function openForgotPopup() {
        document.getElementById("forgotPopup").style.display = "flex";
    }
    // Example: openForgotPopup() can be called from a button elsewhere
    document.getElementById('sendForgotBtn').addEventListener('click', async function() {
        const email = document.getElementById('forgotEmail').value;
        const forgotMsg = document.getElementById('forgotMsg');
        if (!email) {
            forgotMsg.textContent = 'Please enter your email.';
            return;
        }
        forgotMsg.textContent = 'Sending...';
        try {
            const response = await fetch('https://globaldigipulse.onrender.com/forgot-user', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email })
            });
            const data = await response.json();
            if (data.success && data.resetLink) {
                forgotMsg.innerHTML = `Reset link: <a href='${data.resetLink}' target='_blank' style='color:#ffe066;text-decoration:underline;'>Click here to reset your username and password</a>`;
            } else {
                forgotMsg.textContent = data.error || 'Unable to send details.';
            }
        } catch {
            forgotMsg.textContent = 'Server error or invalid response.';
        }
    });
    </script>
</body>
</html>
