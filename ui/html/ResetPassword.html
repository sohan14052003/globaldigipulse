<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Educate And Learn</title>
    <link rel="stylesheet" href="loginpage.css">
    <style>
        body { 
            background-color: #ffe066;
            background-image: url('/html/detail-brain-animation-hd-8k-wallpaper-background-stock-photographic-image_915071-23473.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center center;
        }
        .reset-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .reset-box {
            padding: 40px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(46, 154, 208, 0.18);
            min-width: 340px;
            background: rgba(255, 255, 255, 0.92);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h2 { color: #2e9ad0; margin-bottom: 28px; }
        .input-box { width: 100%; margin-bottom: 18px; }
        .input-box input {
            width: 100%;
            padding: 12px;
            font-size: 18px;
            border-radius: 8px;
            border: 1px solid #2e9ad0;
        }
        button {
            padding: 14px 0;
            font-size: 18px;
            background: #2e9ad0;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            box-shadow: 0 2px 8px #ffe066;
            width: 100%;
        }
        #resetMsg {
            margin-top: 18px;
            color: #ff4e50;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <div class="reset-box">
            <h2>Reset Username & Password</h2>
            <div class="input-box">
                <input type="text" id="newUsername" placeholder="Enter new username">
            </div>
            <div class="input-box">
                <input type="password" id="newPassword" placeholder="Enter new password">
            </div>
            <button id="resetBtn">Reset</button>
            <div id="resetMsg"></div>
        </div>
    </div>
    <script>
    // Get token from URL
    function getToken() {
        const params = new URLSearchParams(window.location.search);
        return params.get('token');
    }
    document.getElementById('resetBtn').addEventListener('click', async function() {
        const newUsername = document.getElementById('newUsername').value;
        const newPassword = document.getElementById('newPassword').value;
        const resetMsg = document.getElementById('resetMsg');
        const token = getToken();
        if (!newUsername || !newPassword) {
            resetMsg.textContent = 'Please enter a new username and password.';
            return;
        }
        resetMsg.textContent = 'Resetting...';
        try {
            const response = await fetch('https://globaldigipulse.onrender.com/reset-username-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, newUsername, newPassword })
            });
            const data = await response.json();
            if (data.success) {
                resetMsg.textContent = 'Reset successful! Use your new username and password to log in.';
                setTimeout(() => {
                    window.location.href = 'LoginPage.html';
                }, 1800);
            } else {
                resetMsg.textContent = data.error || 'Unable to reset.';
            }
        } catch {
            resetMsg.textContent = 'Server error or invalid response.';
        }
    });
    </script>
</body>
</html>
