<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="businessPage.css">
    <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            background-color: #232946;
        }
        .header-section {
            padding: 40px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(46, 154, 208, 0.18);
            background: rgba(255,255,255,0.92);
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1.main-title {
            color: #2e9ad0;
            font-size: 2.6rem;
            text-shadow: 2px 2px 12px #ffe066, 0 2px 8px #2e9ad0;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 18px;
            text-align: center;
        }
        .button-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-left: 16px; /* was 48px, now moved left */
            margin-top: 48px;  /* was 180px, now moved up */
            align-items: stretch;
        }
        .btn-group {
            width: 100%;
            max-width: 700px; /* was 520px, now even wider */
            min-width: 340px;
            min-height: 100px;  /* was 80px, now even bigger */
            display: flex;
            align-items: center;
            box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0;
            border-radius: 40px; /* was 32px, now even bigger */
            background: rgba(255,255,255,0.92);
            position: relative;
            overflow: visible;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .btn-group::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 32px;
            background: linear-gradient(120deg, #ffe066 0%, #2e9ad0 100%);
            filter: blur(8px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .btn-group:hover {
            box-shadow: 0 12px 36px #ffe066, 0 4px 24px #2e9ad0;
            transform: scale(1.035);
        }
        .icon-circle {
            width: 72px; /* was 56px, now even bigger */
            height: 72px; /* was 56px, now even bigger */
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px; /* was 26px, now even bigger */
            border-radius: 50%;
            background: #fff;
            margin-right: 28px; /* was 20px, now even bigger */
            box-shadow: 0 2px 8px #2e9ad0a0;
        }
        .label {
            font-size: 1.7rem; /* was 1.3rem, now even bigger */
            font-weight: 700;
            color: #232946;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .video-preview {
            width: 100%;
            max-width: 420px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px #2e9ad0;
            overflow: hidden;
            background: rgba(255,255,255,0.92);
            padding: 24px;
            margin-left: 350px; /* move video box further right */
            margin-top: 34px; /* move video box a little down */
        }
        .main-action-btn {
            background: linear-gradient(90deg, #2e9ad0 0%, #ffe066 100%);
            color: #232946;
            border: none;
            border-radius: 32px;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s, box-shadow 0.18s;
            outline: none;
            z-index: 1;
            animation: pulseGlow 1.8s infinite;
        }
        .main-action-btn::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 36px;
            background: linear-gradient(120deg, #ffe066 0%, #2e9ad0 100%);
            filter: blur(8px);
            opacity: 0.5;
            z-index: -1;
            transition: opacity 0.2s;
        }
        .main-action-btn:hover, .main-action-btn:focus {
            transform: scale(1.04);
            box-shadow: 0 8px 32px #ffe066, 0 2px 16px #2e9ad0;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0; }
            50% { box-shadow: 0 8px 40px #ffe066, 0 2px 16px #2e9ad0; }
        }
        @media (max-width: 900px) {
            .main-content { flex-direction: column !important; align-items: center !important; gap: 0 !important; }
            .button-sidebar { margin-left: 0 !important; margin-top: 32px !important; }
            .video-preview { margin-left: 0 !important; margin-top: 24px !important; }
        }
        @media (max-width: 600px) {
            .header-section { padding: 12px !important; }
            h1.main-title { font-size: 1.2rem !important; }
            .main-content { flex-direction: column !important; gap: 12px !important; align-items: center !important; }
            .button-sidebar { min-width: unset !important; margin-top: 24px !important; gap: 16px !important; }
            .btn-group { min-height: 48px !important; max-width: 100vw !important; min-width: unset !important; border-radius: 28px !important; }
            .icon-circle { width: 48px !important; height: 48px !important; font-size: 22px !important; margin-right: 12px !important; }
            .label { font-size: 1.1rem !important; }
            .video-preview { max-width: 100vw !important; padding: 12px !important; margin-left: 0 !important; margin-top: 18px !important; }
        }
        .footer-line {
            font-size: 16px !important;
            text-align: center;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: 100vw;
            position: fixed;
            bottom: 0;
            padding: 6px 0 !important;
            color: #fff;
            text-shadow: 1px 1px 4px #2e9ad0;
            background: rgba(46,154,208,0.85);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
  <div class="gradient-overlay" style="position:absolute;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(135deg,#232946 0%,#2e9ad0 100%);opacity:0.85;z-index:0;"></div>
  <div class="main-container" style="position:relative;z-index:1;">
    <header class="header-section">
        <h1 class="main-title">WELCOME TO GLOBAL DIGI PULSE</h1>
    </header>
    <div class="main-content" style="display:flex;flex-direction:row;gap:32px;align-items:flex-start;justify-content:center;margin-top:-32px;">
        <aside class="button-sidebar">
            <div class="btn-group" onclick="showBonusVideoPopup()">
                <span class="icon-circle" style="color:#2e9ad0;">
                    <!-- SVG icon for Bonus -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#2e9ad0" stroke-width="2"/><path d="M8 12l2.5 2.5L16 9" stroke="#2e9ad0" stroke-width="2"/></svg>
                </span>
                <span class="label">Bonus Video</span>
            </div>
            <div class="btn-group" onclick="showBonusVideo2Popup()">
                <span class="icon-circle" style="color:#ff4e50;">
                    <!-- SVG icon for Bonus 2 -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="10" rx="2" stroke="#ff4e50" stroke-width="2"/><path d="M7 11h2" stroke="#ff4e50" stroke-width="2"/><path d="M15 11h2" stroke="#ff4e50" stroke-width="2"/></svg>
                </span>
                <span class="label">Bonus Video 2</span>
            </div>
            <div class="btn-group" onclick="showBonusVideo3Popup()">
                <span class="icon-circle" style="color:#4caf50;">
                    <!-- SVG icon for Bonus 3 -->
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="3" height="8" rx="1.5" fill="#4caf50"/><rect x="9" y="9" width="3" height="12" rx="1.5" fill="#4caf50"/><rect x="15" y="5" width="3" height="16" rx="1.5" fill="#4caf50"/></svg>
                </span>
                <span class="label">Bonus Video 3</span>
            </div>
        </aside>
        <div class="video-preview">
            <video width="100%" height="220" controls style="border-radius:12px; max-height:220px;">
                <source src="https://archive.org/download/short-video.jpg/short%20video%204.jpg.mp4" type="video/mp4">
            </video>
            <div style="margin-top:18px;display:flex;justify-content:center;width:100%;">
                <button id="goToThankYouBtn" class="main-action-btn">CLICK TO LOGOUT</button>
            </div>
        </div>
    </div>
    <!-- Loading spinner -->
    <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center;">
        <div style="border:8px solid #2e9ad0;border-top:8px solid #ffe066;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
    </div>
    <footer class="footer-line" style="position:fixed;left:0;bottom:0;width:100vw;text-align:center;padding:2px 0;color:#fff;font-size:11px;text-shadow:1px 1px 4px #2e9ad0;background:rgba(46,154,208,0.85);z-index:10;">ALL RIGHTS RESERVED</footer>
    <script>
    function showBonusVideoPopup() {
      document.getElementById('bonus-video-popup').style.display = 'flex';
      var vid = document.getElementById('bonus-video');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeBonusVideoPopup() {
      document.getElementById('bonus-video-popup').style.display = 'none';
      var vid = document.getElementById('bonus-video');
      vid.pause();
    }
    function showBonusVideo2Popup() {
      document.getElementById('bonus-video2-popup').style.display = 'flex';
      var vid = document.getElementById('bonus-video2');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeBonusVideo2Popup() {
      document.getElementById('bonus-video2-popup').style.display = 'none';
      var vid = document.getElementById('bonus-video2');
      vid.pause();
    }
    function showBonusVideo3Popup() {
      document.getElementById('bonus-video3-popup').style.display = 'flex';
      var vid = document.getElementById('bonus-video3');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeBonusVideo3Popup() {
      document.getElementById('bonus-video3-popup').style.display = 'none';
      var vid = document.getElementById('bonus-video3');
      vid.pause();
    }
    document.getElementById("goToThankYouBtn")?.addEventListener("click", function() {
      window.location.href = "ThankYouPage.html";
    });
    </script>
    <!-- Bonus Video Popup -->
    <div id="bonus-video-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="bonus-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/BONUS%20VIDEO.jpg.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeBonusVideoPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
    <!-- Bonus Video 2 Popup -->
    <div id="bonus-video2-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="bonus-video2" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/bonus%20video%202.jpg.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeBonusVideo2Popup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
    <!-- Bonus Video 3 Popup -->
    <div id="bonus-video3-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="bonus-video3" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/bonus%20video%203.jpg.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeBonusVideo3Popup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
  </div>
</body>
</html>
