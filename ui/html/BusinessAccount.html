<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Educate And Learn</title>
    <link rel="stylesheet" href="businessPage.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body style="background:#ffe066;position:relative;">
  <div class="gradient-overlay" style="position:absolute;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(135deg,#ffe066 0%,#2e9ad0 100%);opacity:0.85;z-index:0;"></div>
  <div class="main-container" style="position:relative;z-index:1;">
    <header style="padding:32px 24px;border-radius:18px;box-shadow:0 8px 32px rgba(46,154,208,0.18);background:rgba(255,255,255,0.92);margin-bottom:24px;display:flex;flex-direction:column;align-items:center;">
        <h1 style="color:#2e9ad0;font-size:2.2rem;text-shadow:2px 2px 12px #ffe066,0 2px 8px #2e9ad0;font-weight:bold;letter-spacing:2px;margin-bottom:18px;text-align:center;">WELCOME TO GLOBAL DIGI PULSE</h1>
    </header>

    <div class="content" style="display:flex;flex-direction:row;gap:32px;align-items:flex-start;justify-content:center;margin-top:-32px;">
        <div class="button-section" style="display:flex;flex-direction:column;gap:18px;min-width:260px;margin-top:-64px;">
            <div class="custom-btn blue-purple" style="display:flex;align-items:center;padding:16px 24px;border-radius:12px;box-shadow:0 2px 8px #2e9ad0;font-size:16px;font-weight:600;background:linear-gradient(135deg,#2e9ad0 0%,#ffe066 100%);color:#fff;margin-bottom:8px;" onclick="showBonusVideoPopup()">
                <div class="circle" style="width:36px;height:36px;border-radius:50%;background:#fff;color:#2e9ad0;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;font-size:18px;">R</div>
                <span class="text">BONUS VIDEO</span>
            </div>
            <div class="custom-btn orange-pink" style="display:flex;align-items:center;padding:16px 24px;border-radius:12px;box-shadow:0 2px 8px #ff4e50;font-size:16px;font-weight:600;background:linear-gradient(135deg,#ffb347 0%,#ff4e50 100%);color:#fff;margin-bottom:8px;" onclick="showBonusVideo2Popup()">
                <div class="circle" style="width:36px;height:36px;border-radius:50%;background:#fff;color:#ff4e50;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;font-size:18px;">B</div>
                <span class="text" style="text-transform:uppercase;">BONUS VIDEO 2</span>
            </div>
            <div class="custom-btn green-gradient" style="display:flex;align-items:center;padding:16px 24px;border-radius:12px;box-shadow:0 2px 8px #4caf50;font-size:16px;font-weight:600;background:linear-gradient(135deg,#4caf50 0%,#ffe066 100%);color:#fff;margin-bottom:8px;" onclick="showBonusVideo3Popup()">
                <div class="circle" style="width:36px;height:36px;border-radius:50%;background:#fff;color:#4caf50;display:flex;align-items:center;justify-content:center;font-weight:bold;margin-right:12px;font-size:18px;">G</div>
                <span class="text" style="text-transform:uppercase;">BONUS VIDEO 3</span>
            </div>
        </div>
        <div class="left-column" style="flex:1;min-width:260px;">
            <div class="video-section" style="width:100%;max-width:480px;margin:auto;margin-bottom:24px;margin-top:32px;border-radius:18px;box-shadow:0 2px 12px #2e9ad0;overflow:hidden;background:rgba(255,255,255,0.92);padding:28px;">
                <h2 style="color:#ff4e50;font-size:1.1rem;font-weight:bold;text-align:center;margin-bottom:14px;letter-spacing:0.5px;text-transform:uppercase;">HOW TO REACTIVATE YOUR FB BUSINESS MANAGER ACCOUNT IF SUSPENDED</h2>
                <video width="100%" height="220" controls style="border-radius:12px; max-height:220px;">
                    <source src="https://archive.org/download/short-video.jpg/short%20video%204.jpg.mp4" type="video/mp4">
                </video>
            </div>
        </div>
    </div>
    <!-- Loading spinner -->
    <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center;">
        <div style="border:8px solid #2e9ad0;border-top:8px solid #ffe066;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
    </div>
    <footer class="footer-line" style="position:fixed;left:0;bottom:0;width:100vw;text-align:center;padding:16px 0;color:#fff;font-size:16px;text-shadow:1px 1px 4px #2e9ad0;background:rgba(46,154,208,0.85);z-index:10;">ALL RIGHTS RESERVED <button id="logoutBtn" style="padding:2px 6px;font-size:11px;margin-left:0;">Logout</button></footer>
    <style>
      .custom-btn:hover { background:#ff4e50 !important; color:#fff !important; }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }
      @media (max-width:600px) {
        .main-container { padding:8px !important; }
        .header-section { padding:12px !important; }
        h1 { font-size:1.2rem !important; }
        .content { flex-direction:column !important; gap:12px !important; }
        .button-section { min-width:unset !important; }
      }
    </style>
</div>
<!-- Bonus Video Popup -->
<div id="bonus-video-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <video id="bonus-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
      <source src="https://archive.org/download/bonus-video-2.jpg/BONUS%20VIDEO.jpg.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <button onclick="closeBonusVideoPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
  </div>
</div>
<!-- Bonus Video 2 Popup -->
<div id="bonus-video2-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <video id="bonus-video2" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
      <source src="https://archive.org/download/bonus-video-2.jpg/bonus%20video%202.jpg.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <button onclick="closeBonusVideo2Popup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
  </div>
</div>
<!-- Bonus Video 3 Popup -->
<div id="bonus-video3-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
  <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
    <video id="bonus-video3" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
      <source src="https://archive.org/download/bonus-video-2.jpg/bonus%20video%203.jpg.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <button onclick="closeBonusVideo3Popup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
  </div>
</div>
<script>
document.getElementById("logoutBtn").addEventListener("click", function() {
    window.location.href = "ThankYouPage.html";
});
function showBonusVideoPopup() {
  document.getElementById('bonus-video-popup').style.display = 'flex';
  var vid = document.getElementById('bonus-video');
  vid.currentTime = 0;
  vid.pause(); // Do not autoplay
}
function closeBonusVideoPopup() {
  document.getElementById('bonus-video-popup').style.display = 'none';
  var vid = document.getElementById('bonus-video');
  vid.pause();
}
function showBonusVideo2Popup() {
  document.getElementById('bonus-video2-popup').style.display = 'flex';
  var vid = document.getElementById('bonus-video2');
  vid.currentTime = 0;
  vid.pause(); // Do not autoplay
}
function closeBonusVideo2Popup() {
  document.getElementById('bonus-video2-popup').style.display = 'none';
  var vid = document.getElementById('bonus-video2');
  vid.pause();
}
function showBonusVideo3Popup() {
  document.getElementById('bonus-video3-popup').style.display = 'flex';
  var vid = document.getElementById('bonus-video3');
  vid.currentTime = 0;
  vid.pause(); // Do not autoplay
}
function closeBonusVideo3Popup() {
  document.getElementById('bonus-video3-popup').style.display = 'none';
  var vid = document.getElementById('bonus-video3');
  vid.pause();
}
// Add a button and script for redirecting to ThankYouPage.html
const thankYouBtn = document.createElement('button');
thankYouBtn.textContent = 'Finish & Go to Thank You Page';
thankYouBtn.style = 'margin-top:24px;padding:14px 32px;font-size:18px;background:#2e9ad0;color:#fff;border:none;border-radius:8px;cursor:pointer;box-shadow:0 2px 8px #ffe066;';
document.querySelector('.main-container').appendChild(thankYouBtn);
thankYouBtn.onclick = function() {
  window.location.href = 'ThankYouPage.html';
};
</script>
</body>
</html>
