<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Educate And Learn</title>
    <link rel="stylesheet" href="app.css">
    
<style>
    body{
        background-image:url(./detail-brain-animation-hd-8k-wallpaper-background-stock-photographic-image_915071-23473.jpg);
    }
</style>
</head>
<body>

<script src="script.js"></script>

    <div class="overlay">
        <header>
            <h1>WELCOME TO EDUCATE AND LEARN YOURSELF</h1>
        </header>
        <div class="login-container">
            <div class="login-box">
                <div class="profile-icon">
                    <img src="icon-7797704_640.JPG" alt="Profile">
                </div>
                <h2>Login</h2>
                <div class="input-box">
                    <img src="./icon-7797704_640.JPG">
                    <input type="text" id="username" placeholder="Username..." />
                </div>
                <div class="input-box">
                    <img src="lock.jpg">
                    <input type="password" id="password" placeholder="Password..." />
                    
                </div>

                <button id="loginBtn">Sign in</button>
                <div id="message"></div>
                <p class="forgot">Forgot your password?</p>
                <p style="margin-top:18px;">New user? <a href="RegisterPage.html">Register here</a></p>
                </div>
    </div>
     <footer>
            ALL RIGHTS RESERVED
        </footer>
        </div>
        
<script>
document.getElementById("loginBtn").addEventListener("click", async function(e) {
    e.preventDefault();
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;
    const response = await fetch("https://your-backend.onrender.com/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ username, password })
    });
    let messageDiv = document.getElementById("message");
    try {
        const data = await response.json();
        if (data.success) {
            window.location.href = "WelcomePage.html";
        } else {
            messageDiv.textContent = "Login failed: " + (data.error || "Invalid credentials");
        }
    } catch {
        messageDiv.textContent = "Server error or invalid response.";
    }
});
</script>
</body>
</html>
