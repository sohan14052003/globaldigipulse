<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Success - QR Scanner</title>
  <link rel="stylesheet" href="../css/app2.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <style>
    body { background: #e5c37d; }
    .scanner-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
    #qr-reader { width: 320px; margin: 20px auto; }
    .btn { margin-top: 24px; padding: 12px 24px; font-size: 18px; border-radius: 24px; background: #3399cc; color: #fff; border: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="scanner-container">
    <h2>Payment Successful!</h2>
    <p>Scan your QR code to continue.</p>
    <div id="qr-reader"></div>
    <button class="btn" id="goWelcomeBtn">Go to Welcome Page</button>
    <div id="scanResult"></div>
  </div>
  <script src="https://unpkg.com/html5-qrcode@2.3.7/minified/html5-qrcode.min.js"></script>
  <script>
    const qrReader = new Html5Qrcode("qr-reader");
    let scanned = false;
    qrReader.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 },
      qrCodeMessage => {
        if (!scanned) {
          document.getElementById('scanResult').innerHTML = 'QR Code Scanned: ' + qrCodeMessage;
          scanned = true;
          qrReader.stop();
        }
      },
      error => {})
      .catch(err => {
        document.getElementById('scanResult').innerHTML = 'Camera error: ' + err;
      });
    document.getElementById('goWelcomeBtn').onclick = function() {
      window.location.href = 'WelcomePage.html';
    };
  </script>
</body>
</html>
