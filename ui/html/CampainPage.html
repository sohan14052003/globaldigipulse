<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL DIGI PULSE</title>
    <link rel="stylesheet" href="campaign.css">
    <link rel="icon" type="image/png" href="../images/icon-7797704_640.JPG">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        body {
            background-color: #f7f7fa;
        }
        .header-section {
            padding: 40px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 32px rgba(46, 154, 208, 0.18);
            background: rgba(255,255,255,0.92);
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1.main-title {
            color: #2e9ad0;
            font-size: 2.6rem;
            text-shadow: 2px 2px 12px #ffe066, 0 2px 8px #2e9ad0;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 18px;
            text-align: center;
        }
        .sub-title {
            font-size: 1.2rem;
            color: #ff4e50;
            font-weight: 600;
            text-align: center;
            margin-bottom: 12px;
        }
        .button-sidebar {
            display: flex;
            flex-direction: column;
            gap: 24px;
            margin-left: 48px;
            margin-top: 32px; /* was 80px, now moved further up */
            align-items: stretch;
        }
        .btn-group {
            width: 100%;
            max-width: 380px;
            min-height: 64px;
            display: flex;
            align-items: center;
            box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0;
            border-radius: 28px;
            background: rgba(255,255,255,0.92);
            position: relative;
            overflow: visible;
            transition: box-shadow 0.2s, transform 0.2s;
        }
        .btn-group::before {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 32px;
            background: linear-gradient(120deg, #ffe066 0%, #2e9ad0 100%);
            filter: blur(8px);
            opacity: 0.4;
            z-index: 0;
            pointer-events: none;
        }
        .btn-group:hover {
            box-shadow: 0 12px 36px #ffe066, 0 4px 24px #2e9ad0;
            transform: scale(1.035);
        }
        .icon-circle {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            border-radius: 50%;
            background: #fff;
            margin-right: 16px;
            box-shadow: 0 2px 8px #2e9ad0a0;
        }
        .label {
            font-size: 1.1rem;
            font-weight: 700;
            color: #232946;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .video-preview {
            width: 100%;
            max-width: 420px;
            margin-bottom: 24px;
            border-radius: 12px;
            box-shadow: 0 2px 8px #2e9ad0;
            overflow: hidden;
            background: rgba(255,255,255,0.92);
            padding: 24px;
        }
        .main-action-btn {
            background: linear-gradient(90deg, #2e9ad0 0%, #ffe066 100%);
            color: #232946;
            border: none;
            border-radius: 32px;
            padding: 16px 40px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0;
            margin-top: 24px;
            position: relative;
            overflow: hidden;
            transition: transform 0.18s, box-shadow 0.18s;
            outline: none;
            z-index: 1;
            animation: pulseGlow 1.8s infinite;
        }
        .main-action-btn::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            border-radius: 36px;
            background: linear-gradient(120deg, #ffe066 0%, #2e9ad0 100%);
            filter: blur(8px);
            opacity: 0.5;
            z-index: -1;
            transition: opacity 0.2s;
        }
        .main-action-btn:hover, .main-action-btn:focus {
            transform: scale(1.04);
            box-shadow: 0 8px 32px #ffe066, 0 2px 16px #2e9ad0;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 24px #2e9ad0a0, 0 2px 8px #ffe066a0; }
            50% { box-shadow: 0 8px 40px #ffe066, 0 2px 16px #2e9ad0; }
        }
        @media (max-width: 900px) {
            .main-content { flex-direction: column !important; align-items: center !important; }
            .button-sidebar { margin-left: 0; margin-top: 32px; }
        }
        @media (max-width: 600px) {
            .header-section { padding: 12px !important; }
            h1.main-title { font-size: 1.2rem !important; }
            .main-content { flex-direction: column !important; gap: 12px !important; align-items: center !important; }
            .button-sidebar { min-width: unset !important; margin-top: 18px !important; gap: 16px !important; align-items: center !important; width: 100vw !important; display: flex !important; flex-direction: column !important; justify-content: center !important; }
            .btn-group { min-height: 48px; max-width: 98vw; border-radius: 16px; }
        }
        .footer-line {
            font-size: 16px;
            text-align: center;
            left: 0;
            right: 0;
            margin: 0 auto;
            width: 100vw;
            position: fixed;
            bottom: 0;
            padding: 6px 0; /* make the footer height a little shorter */
            color: #fff;
            text-shadow: 1px 1px 4px #2e9ad0;
            background: rgba(46,154,208,0.85);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
  <div class="gradient-overlay" style="position:absolute;top:0;left:0;width:100vw;height:100vh;background:linear-gradient(135deg,#f7f7fa 0%,#2e9ad0 100%);opacity:0.85;z-index:0;"></div>
  <div class="wrapper" style="position:relative;z-index:1;">
    <header class="header-section">
      <h1 class="main-title">WELCOME TO GLOBAL DIGI PULSE</h1>
      <p class="sub-title"> </p>
      <button id="payYoutubeBtn" style="margin-top:18px;font-size:1.3rem;font-weight:700;padding:16px 38px;border-radius:32px;background:linear-gradient(90deg,#ff4e50 0%,#ffe066 100%);color:#fff;box-shadow:0 2px 16px #ffe066,0 2px 8px #ff4e50;border:none;cursor:pointer;transition:background 0.3s;">Pay ₹1499 to Unlock YouTube Campaign Videos</button>
    </header>
    <main class="main-content" style="display:flex;flex-direction:row;align-items:flex-start;justify-content:center;">
      <aside class="button-sidebar">
        <div class="btn-group" onclick="showYoutubeCampaignPopup()">
          <span class="icon-circle" style="color:#ff4e50;">
            <!-- SVG icon for YouTube -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><path d="M23 7.5s-.2-1.7-.8-2.4c-.7-.8-1.5-.8-1.9-.9C16.2 3.8 12 3.8 12 3.8h0s-4.2 0-8.3.4c-.4.1-1.2.1-1.9.9C1.2 5.8 1 7.5 1 7.5S.8 9.3.8 11.1v1.8c0 1.8.2 3.6.2 3.6s.2 1.7.8 2.4c.7.8 1.6.8 2 .9 2.1.2 8.2.4 8.2.4s4.2 0 8.3-.4c.4-.1 1.2-.1 1.9-.9.6-.7.8-2.4.8-2.4s.2-1.8.2-3.6v-1.8c0-1.8-.2-3.6-.2-3.6zM9.8 15.3V8.7l6.4 3.3-6.4 3.3z" fill="#ff4e50"/></svg>
          </span>
          <span class="label">How to setup your first YouTube campaign</span>
        </div>
        <div class="btn-group" onclick="showCampaignSetupPopup()">
          <span class="icon-circle" style="color:#2e9ad0;">
            <!-- SVG icon for Campaign -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="#2e9ad0" stroke-width="2"/><path d="M8 12l2.5 2.5L16 9" stroke="#2e9ad0" stroke-width="2"/></svg>
          </span>
          <span class="label">Entire campaign setup video</span>
        </div>
        <div class="btn-group" onclick="showBillingPopup()">
          <span class="icon-circle" style="color:#ffb347;">
            <!-- SVG icon for Billing -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="7" width="18" height="10" rx="2" stroke="#ffb347" stroke-width="2"/><path d="M7 11h2" stroke="#ffb347" stroke-width="2"/><path d="M15 11h2" stroke="#ffb347" stroke-width="2"/></svg>
          </span>
          <span class="label">How to add billing in to setup ads</span>
        </div>
        <div class="btn-group" onclick="showAnalyzeDataPopup()">
          <span class="icon-circle" style="color:#4caf50;">
            <!-- SVG icon for Analyze -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none"><rect x="3" y="13" width="3" height="8" rx="1.5" fill="#4caf50"/><rect x="9" y="9" width="3" height="12" rx="1.5" fill="#4caf50"/><rect x="15" y="5" width="3" height="16" rx="1.5" fill="#4caf50"/></svg>
          </span>
          <span class="label">How to analyse your data</span>
        </div>
      </aside>
      <div class="video-preview">
        <video width="100%" height="220" controls style="border-radius:12px; max-height:220px;">
          <source src="https://archive.org/download/short-video.jpg/short%20video%203.jpg.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <div style="margin-top:18px;display:flex;justify-content:center;width:100%;">
          <button id="goToBusinessBtn" class="main-action-btn">Next Page</button>
        </div>
      </div>
    </main>
    <footer class="footer-line" style="position:fixed;left:0;bottom:0;width:100vw;text-align:center;padding:6px 0;color:#fff;font-size:16px;text-shadow:1px 1px 4px #2e9ad0;background:rgba(46,154,208,0.85);z-index:10;display:flex;justify-content:center;align-items:center;">All rights reserved</footer>
    <!-- Loading spinner -->
    <div id="loadingSpinner" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,255,255,0.7);z-index:999;justify-content:center;align-items:center;">
        <div style="border:8px solid #2e9ad0;border-top:8px solid #ffe066;border-radius:50%;width:60px;height:60px;animation:spin 1s linear infinite;"></div>
    </div>
    <script>
    function showSpinner() {
        document.getElementById('loadingSpinner').style.display = 'flex';
    }
    function hideSpinner() {
        document.getElementById('loadingSpinner').style.display = 'none';
    }
    function showYoutubeCampaignPopup() {
      document.getElementById('youtube-campaign-popup').style.display = 'flex';
      var vid = document.getElementById('youtube-campaign-video');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeYoutubeCampaignPopup() {
      document.getElementById('youtube-campaign-popup').style.display = 'none';
      var vid = document.getElementById('youtube-campaign-video');
      vid.pause();
    }
    function showCampaignSetupPopup() {
      document.getElementById('campaign-setup-popup').style.display = 'flex';
      var vid = document.getElementById('campaign-setup-video');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeCampaignSetupPopup() {
      document.getElementById('campaign-setup-popup').style.display = 'none';
      var vid = document.getElementById('campaign-setup-video');
      vid.pause();
    }
    function showBillingPopup() {
      document.getElementById('billing-popup').style.display = 'flex';
      var vid = document.getElementById('billing-video');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeBillingPopup() {
      document.getElementById('billing-popup').style.display = 'none';
      var vid = document.getElementById('billing-video');
      vid.pause();
    }
    function showAnalyzeDataPopup() {
      document.getElementById('analyze-data-popup').style.display = 'flex';
      var vid = document.getElementById('analyze-data-video');
      vid.currentTime = 0;
      vid.pause(); // Do not autoplay
    }
    function closeAnalyzeDataPopup() {
      document.getElementById('analyze-data-popup').style.display = 'none';
      var vid = document.getElementById('analyze-data-video');
      vid.pause();
    }
    // Disable all sidebar buttons and Next button until payment is successful
    const sidebarBtns = document.querySelectorAll('.button-sidebar .btn-group');
    const nextBtn = document.getElementById('goToBusinessBtn');
    const payYoutubeBtn = document.getElementById('payYoutubeBtn');
    sidebarBtns.forEach(btn => btn.setAttribute('disabled', 'disabled'));
    sidebarBtns.forEach(btn => {
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.5';
      btn.style.filter = 'grayscale(0.7)';
    });
    if (nextBtn) {
      nextBtn.setAttribute('disabled', 'disabled');
      nextBtn.style.pointerEvents = 'none';
      nextBtn.style.opacity = '0.5';
      nextBtn.style.filter = 'grayscale(0.7)';
    }
    if (payYoutubeBtn) {
      payYoutubeBtn.disabled = false;
      payYoutubeBtn.style.opacity = '';
      payYoutubeBtn.style.pointerEvents = '';
      payYoutubeBtn.style.filter = '';
    }

    // Check localStorage for payment status
    let campaignPaid = localStorage.getItem('campaignPaid') === 'true';
    if (campaignPaid) {
      enableSidebarButtons();
      enableNextButton();
      disablePayYoutubeBtn();
    }

    function enableSidebarButtons() {
      sidebarBtns.forEach(btn => btn.removeAttribute('disabled'));
      sidebarBtns.forEach(btn => {
        btn.style.pointerEvents = '';
        btn.style.opacity = '';
        btn.style.filter = '';
      });
    }
    function enableNextButton() {
      if (nextBtn) {
        nextBtn.removeAttribute('disabled');
        nextBtn.style.pointerEvents = '';
        nextBtn.style.opacity = '';
        nextBtn.style.filter = '';
      }
    }
    function disablePayYoutubeBtn() {
      if (payYoutubeBtn) {
        payYoutubeBtn.disabled = true;
        payYoutubeBtn.textContent = 'Already Paid';
        payYoutubeBtn.style.opacity = '0.6';
        payYoutubeBtn.style.pointerEvents = 'none';
        payYoutubeBtn.style.filter = 'grayscale(0.7)';
      }
    }

    document.getElementById("goToBusinessBtn")?.addEventListener("click", function() {
      window.location.href = "BusinessAccount.html";
    });
    document.getElementById("payYoutubeBtn")?.addEventListener("click", function() {
      const userId = localStorage.getItem('userId');
      const email = localStorage.getItem('email') || '';
      const name = localStorage.getItem('name') || '';
      fetch("/create-order", {
        method: "POST",
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, amount: 149900 }) // ₹1499 in paise
      })
        .then(res => res.json())
        .then(order => {
          if (order && order.id) {
            const options = {
              key: 'rzp_live_SgVjOOUUHbzBIS', // Razorpay live key
              amount: order.amount,
              currency: order.currency,
              name: 'GLOBAL DIGI PULSE',
              description: 'Unlock YouTube Campaign Videos',
              order_id: order.id,
              handler: function (response) {
                // Payment verification logic here if needed
                alert('Payment successful!');
                localStorage.setItem('campaignPaid', 'true');
                enableSidebarButtons();
                enableNextButton();
                disablePayYoutubeBtn();
              },
              prefill: {
                name: name,
                email: email
              },
              theme: {
                color: '#ff4e50'
              },
              modal: {
                ondismiss: function() {
                  // Optionally handle modal close
                }
              }
            };
            const rzp = new Razorpay(options);
            rzp.open();
          } else {
            alert('Failed to create order.');
          }
        })
        .catch(() => {
          alert('Server error.');
        });
    });
    </script>
    <!-- YouTube Campaign Video Popup -->
    <div id="youtube-campaign-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="youtube-campaign-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/1.%20How%20to%20setup%20your%20first%20youtube%20campaign.jpg.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeYoutubeCampaignPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
    <!-- Campaign Setup Video Popup -->
    <div id="campaign-setup-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="campaign-setup-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/2.%20Entire%20campaign%20setup%20video.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeCampaignSetupPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
    <!-- Billing Video Popup -->
    <div id="billing-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="billing-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/3.%20How%20to%20add%20billing%20in%20to%20setup%20ads.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeBillingPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
    <!-- Analyze Data Video Popup -->
    <div id="analyze-data-popup" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;">
      <div style="background:none;padding:0;border-radius:0;box-shadow:none;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;">
        <video id="analyze-data-video" width="100%" height="100%" controls style="border-radius:0;max-width:100vw;max-height:100vh;background:#000;">
          <source src="https://archive.org/download/bonus-video-2.jpg/4.%20How%20to%20analyse%20your%20data.mp4" type="video/mp4">
          Your browser does not support the video tag.
        </video>
        <button onclick="closeAnalyzeDataPopup()" style="position:absolute;top:32px;right:32px;background:#ff4e50;color:#fff;border:none;border-radius:8px;padding:10px 24px;font-size:18px;font-weight:bold;cursor:pointer;z-index:1001;">Close</button>
      </div>
    </div>
  </div>
</body>
</html>
